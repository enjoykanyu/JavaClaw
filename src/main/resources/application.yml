server:
  port: 0

spring:
  application:
    name: kanyu-ai-companion

  datasource:
    url: jdbc:h2:mem:companion_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:qwen2.5:7b}
        options:
          temperature: 0.7

milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  database: ${MILVUS_DATABASE:default}

companion:
  memory:
    short-term-limit: 10
    long-term-threshold: 0.8
    consolidation-interval: 3600000
  greeting:
    enabled: true
    morning-cron: "0 0 8 * * ?"
    evening-cron: "0 0 22 * * ?"
  news:
    enabled: true
    push-cron: "0 0 * * * ?"

logging:
  level:
    com.alibaba.cloud.ai: DEBUG
    org.springframework.ai: DEBUG
    com.kanyu.companion: DEBUG
